name: E2E Tests (Playwright)

on:
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 6:00 UTC
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  test:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Create auth state directory
        run: mkdir -p .playwright

      - name: Run Playwright tests
        run: npx playwright test
        env:
          BASE_URL: https://www.ktimahub.gr
          TEST_OWNER_EMAIL: ${{ secrets.TEST_OWNER_EMAIL }}
          TEST_OWNER_PASSWORD: ${{ secrets.TEST_OWNER_PASSWORD }}
          TEST_LEASEHOLDER_EMAIL: ${{ secrets.TEST_LEASEHOLDER_EMAIL }}
          TEST_LEASEHOLDER_PASSWORD: ${{ secrets.TEST_LEASEHOLDER_PASSWORD }}

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
